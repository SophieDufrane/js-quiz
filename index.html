<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascirpt Quiz</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header><h1>JavaScript Quiz</h1></header>

    <main>
      <section id="quiz-container">
        <div id="progress-bar"></div>
        <p id="question">Question text will appear here</p>

        </div>

        <!-- Temporarily kept during refactor -->
        <p id="answer"></p>
        <p id="score"></p>
      </section>
    </main>

    <footer>
      <p>
        JavaScript Quiz App
        <a
          href="https://github.com/SophieDufrane"
          target="_blank"
          rel="noopener noreferrer"

          created by Sophie Dufrane
        </a>
      </p>

    <script src="js/script.js"></script>
